<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Matrix Pro | مساعد القرار الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 550px; /* عرض مالي ومناسب للهواتف */
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            color: var(--secondary);
            margin-bottom: 25px;
        }

        .input-section {
            display: flex;
            flex-direction: column; /* عمودي للهاتف */
            gap: 12px;
            margin-bottom: 30px;
        }

        /* تحويله لأفقي في الشاشات الواسعة */
        @media (min-width: 480px) {
            .input-section { flex-direction: row; }
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            font-size: 1rem;
        }

        .criteria-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-right: 5px solid var(--primary);
        }

        .criteria-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #2d3436;
            color: white;
            border: none;
            cursor: pointer;
        }

        .weight-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--secondary);
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--secondary);
        }

        .decide-btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(90deg, var(--primary), #8e44ad);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        .decide-btn:active { transform: scale(0.98); }

        #resultArea {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: none;
            text-align: center;
            border: 1px dashed var(--secondary);
        }

        #winnerName {
            display: block;
            font-size: 1.4rem;
            color: var(--secondary);
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 مساعد القرار الذكي</h1>

    <div class="input-section">
        <input type="text" id="op1" placeholder="الخيار الأول">
        <input type="text" id="op2" placeholder="الخيار الثاني">
    </div>

    <div class="criteria-card">
        <div class="criteria-header">
            <span>💰 الميزانية والتكلفة</span>
            <select id="v_price">
                <option value="1">الخيار الأول أفضل (أوفر)</option>
                <option value="2">الخيار الثاني أفضل (أوفر)</option>
            </select>
        </div>
        <div class="weight-label"><span>أهمية السعر</span> <span id="w_price_val">50%</span></div>
        <input type="range" id="w_price" min="1" max="100" value="50" oninput="document.getElementById('w_price_val').innerText = this.value + '%'">
    </div>

    <div class="criteria-card" style="border-right-color: var(--secondary);">
        <div class="criteria-header">
            <span>⏱️ توفير الوقت</span>
            <select id="v_time">
                <option value="1">الخيار الأول أسرع</option>
                <option value="2">الخيار الثاني أسرع</option>
            </select>
        </div>
        <div class="weight-label"><span>أهمية الوقت</span> <span id="w_time_val">50%</span></div>
        <input type="range" id="w_time" min="1" max="100" value="50" oninput="document.getElementById('w_time_val').innerText = this.value + '%'">
    </div>

    <div class="criteria-card" style="border-right-color: #ff7675;">
        <div class="criteria-header">
            <span>😊 الراحة النفسية</span>
            <select id="v_happy">
                <option value="1">الخيار الأول يريحني أكثر</option>
                <option value="2">الخيار الثاني يريحني أكثر</option>
            </select>
        </div>
        <div class="weight-label"><span>أهمية السعادة</span> <span id="w_happy_val">50%</span></div>
        <input type="range" id="w_happy" min="1" max="100" value="50" oninput="document.getElementById('w_happy_val').innerText = this.value + '%'">
    </div>

    <button class="decide-btn" onclick="calculateDecision()">🎯 اتخاذ القرار النهائي</button>

    <div id="resultArea">
        <span>النتيجة المقترحة:</span>
        <span id="winnerName"></span>
    </div>
</div>

<script>
    // التأكد من تعريف الدالة بشكل صحيح
    function calculateDecision() {
        console.log("جاري حساب القرار...");
        
        // جلب المدخلات
        const op1 = document.getElementById("op1").value || "الخيار 1";
        const op2 = document.getElementById("op2").value || "الخيار 2";

        // جلب الاختيارات (أي خيار فاز في كل معيار)
        const pWinner = document.getElementById("v_price").value;
        const tWinner = document.getElementById("v_time").value;
        const hWinner = document.getElementById("v_happy").value;

        // جلب الأوزان
        const pWeight = parseInt(document.getElementById("w_price").value);
        const tWeight = parseInt(document.getElementById("w_time").value);
        const hWeight = parseInt(document.getElementById("w_happy").value);

        let score1 = 0;
        let score2 = 0;

        // الحساب المنطقي
        if(pWinner === "1") score1 += pWeight; else score2 += pWeight;
        if(tWinner === "1") score1 += tWeight; else score2 += tWeight;
        if(hWinner === "1") score1 += hWeight; else score2 += hWeight;

        // إظهار النتائج بصرياً
        const resArea = document.getElementById("resultArea");
        const winName = document.getElementById("winnerName");

        resArea.style.display = "block";
        
        if (score1 > score2) {
            winName.innerText = op1;
        } else if (score2 > score1) {
            winName.innerText = op2;
        } else {
            winName.innerText = "تعادل! كلاهما مناسب.";
        }

        // تمرير تلقائي للنتيجة
        resArea.scrollIntoView({ behavior: 'smooth' });
    }

    // لضمان استدعاء الدالة من الزر في كل المتصفحات
    window.calculateDecision = calculateDecision;
</script>

</body>
</html>
