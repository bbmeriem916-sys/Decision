<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Engine Pro | محرك القرارات العالمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --feminine: #ff75c3;
            --masculine: #00d2ff;
            --glass: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: #0f0c29;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* تأثير الفقاعات المائية */
        .ocean { position: fixed; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #0f0c29 0%, #24243e 100%); overflow: hidden; top:0; left:0; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            z-index: 10;
        }

        /* شريط اختيار اللغة */
        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-btn {
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--masculine);
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .lang-btn.active { background: var(--masculine); color: #000; font-weight: bold; }

        h1 {
            text-align: center;
            background: linear-gradient(90deg, var(--feminine), var(--masculine));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        @media (min-width: 480px) { .input-group { flex-direction: row; } }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 0.9rem;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            border-left: 4px solid var(--feminine);
            border-right: 4px solid var(--masculine);
        }

        .weight-ui { margin-top: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        input[type="range"] { flex: 1; accent-color: var(--masculine); }

        .btn-decide {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--feminine), var(--masculine));
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        #resultBox {
            margin-top: 20px;
            display: none;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--secondary);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="ocean" id="ocean"></div>

<div class="container">
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('ar')">العربية</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
    </div>

    <h1 id="txt-title">محرك القرارات الذكي</h1>
    
    <div class="input-group">
        <input type="text" id="op1" placeholder="الخيار الأول">
        <input type="text" id="op2" placeholder="الخيار الثاني">
    </div>

    <div class="card">
        <label id="txt-price">💰 التكلفة والميزانية</label>
        <select id="v_price">
            <option value="1" class="opt1-text">الخيار الأول أفضل</option>
            <option value="2" class="opt2-text">الخيار الثاني أفضل</option>
        </select>
        <div class="weight-ui"><span class="txt-importance">الأهمية:</span><input type="range" id="w_price" value="50"></div>
    </div>

    <div class="card">
        <label id="txt-time">⏱️ الوقت والجهد</label>
        <select id="v_time">
            <option value="1" class="opt1-text">الخيار الأول أفضل</option>
            <option value="2" class="opt2-text">الخيار الثاني أفضل</option>
        </select>
        <div class="weight-ui"><span class="txt-importance">الأهمية:</span><input type="range" id="w_time" value="50"></div>
    </div>

    <div class="card">
        <label id="txt-happy">💖 الراحة النفسية</label>
        <select id="v_happy">
            <option value="1" class="opt1-text">الخيار الأول أفضل</option>
            <option value="2" class="opt2-text">الخيار الثاني أفضل</option>
        </select>
        <div class="weight-ui"><span class="txt-importance">الأهمية:</span><input type="range" id="w_happy" value="50"></div>
    </div>

    <button class="btn-decide" id="txt-btn" onclick="generateDecision()">🎯 اتخاذ القرار</button>

    <div id="resultBox">
        <h2 id="winnerTitle"></h2>
        <p id="logicReason" style="margin-top:10px; font-size: 0.9rem; opacity: 0.9;"></p>
    </div>
</div>

<script>
    // القاموس اللغوي
    const translations = {
        ar: {
            title: "✨ محرك القرارات الذكي",
            op1: "الخيار الأول", op2: "الخيار الثاني",
            price: "💰 التكلفة والميزانية", time: "⏱️ الوقت والجهد", happy: "💖 الراحة النفسية",
            importance: "الأهمية:", btn: "🎯 اتخاذ القرار وتحليل الأسباب",
            opt1Best: "الخيار الأول أفضل", opt2Best: "الخيار الثاني أفضل",
            winTxt: "🏆 القرار المقترح: ", reason: "بناءً على الأوزان المعطاة، تفوق هذا الخيار في المعايير الأكثر أهمية لك.",
            dir: "rtl", lang: "ar"
        },
        en: {
            title: "✨ Smart Decision Engine",
            op1: "Option 1", op2: "Option 2",
            price: "💰 Cost & Budget", time: "⏱️ Time & Effort", happy: "💖 Mental Satisfaction",
            importance: "Importance:", btn: "🎯 Make Decision & Analyze",
            opt1Best: "Option 1 is better", opt2Best: "Option 2 is better",
            winTxt: "🏆 Suggested Decision: ", reason: "Based on the given weights, this option excelled in the criteria most important to you.",
            dir: "ltr", lang: "en"
        },
        fr: {
            title: "✨ Moteur de Décision",
            op1: "Option 1", op2: "Option 2",
            price: "💰 Coût et Budget", time: "⏱️ Temps et Effort", happy: "💖 Satisfaction Mentale",
            importance: "Importance:", btn: "🎯 Prendre une décision",
            opt1Best: "Option 1 est meilleure", opt2Best: "Option 2 est meilleure",
            winTxt: "🏆 Décision Suggérée: ", reason: "Selon les poids donnés, cette option a excellé dans les critères les plus importants pour vous.",
            dir: "ltr", lang: "fr"
        }
    };

    function setLanguage(lang) {
        const t = translations[lang];
        document.getElementById('mainHtml').dir = t.dir;
        document.getElementById('mainHtml').lang = t.lang;
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('op1').placeholder = t.op1;
        document.getElementById('op2').placeholder = t.op2;
        document.getElementById('txt-price').innerText = t.price;
        document.getElementById('txt-time').innerText = t.time;
        document.getElementById('txt-happy').innerText = t.happy;
        document.querySelectorAll('.txt-importance').forEach(el => el.innerText = t.importance);
        document.getElementById('txt-btn').innerText = t.btn;
        document.querySelectorAll('.opt1-text').forEach(el => el.innerText = t.opt1Best);
        document.querySelectorAll('.opt2-text').forEach(el => el.innerText = t.opt2Best);
        
        // تحديث الأزرار
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    // فقاعات الماء
    function createBubbles() {
        const ocean = document.getElementById('ocean');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 50 + 10 + 'px';
            bubble.style.width = size; bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            ocean.appendChild(bubble);
        }
    }
    createBubbles();

    function generateDecision() {
        const lang = document.getElementById('mainHtml').lang;
        const t = translations[lang];
        const op1 = document.getElementById("op1").value || t.op1;
        const op2 = document.getElementById("op2").value || t.op2;

        const s1 = (parseInt(document.getElementById("v_price").value === "1" ? document.getElementById("w_price").value : 0)) +
                   (parseInt(document.getElementById("v_time").value === "1" ? document.getElementById("w_time").value : 0)) +
                   (parseInt(document.getElementById("v_happy").value === "1" ? document.getElementById("w_happy").value : 0));
        
        const s2 = (parseInt(document.getElementById("v_price").value === "2" ? document.getElementById("w_price").value : 0)) +
                   (parseInt(document.getElementById("v_time").value === "2" ? document.getElementById("w_time").value : 0)) +
                   (parseInt(document.getElementById("v_happy").value === "2" ? document.getElementById("w_happy").value : 0));

        const winner = s1 >= s2 ? op1 : op2;
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("winnerTitle").innerText = t.winTxt + winner;
        document.getElementById("logicReason").innerText = t.reason;
        document.getElementById("resultBox").scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
